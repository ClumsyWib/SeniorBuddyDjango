[pytest]
# These repository files are mostly "debug scripts" named test_*.py that
# execute at import time and are not written as real unit tests.
# We only want pytest to discover actual Django unit tests in senior_care/tests.py.
python_files = tests*.py

# Let pytest-django know which settings to use (also helps if any module
# relies on Django during import).
DJANGO_SETTINGS_MODULE = backend.settings

addopts = -q
